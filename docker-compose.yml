services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/
          target: /app
          action: sync
          ignore:
            - node_modules/
            - .next/

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=employability_db;Username=postgres;Password=postgres
    depends_on:
      - db
    develop:
      watch:
        - path: ./backend/Backend.csproj
          action: rebuild
        - path: ./backend/
          target: /src
          action: sync
          ignore:
            - bin/
            - obj/

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=employability_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
